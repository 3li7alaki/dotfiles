# Portable tmux baseline owned by the dotfiles repo.

# Safe terminal capabilities across local machines and SSH hosts.
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Responsive, persistent sessions.
set -sg escape-time 10
set -g history-limit 100000
set -g focus-events on
set -g mouse on
set -g set-clipboard on

# Predictable numbering and vi-style copy mode.
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
setw -g mode-keys vi

# New panes/windows inherit the active pane's working directory.
bind c new-window -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Reload and ergonomic pane movement/resizing without changing the default prefix.
unbind r
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Copy to tmux's buffer and the native macOS/Linux clipboard when one is available.
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "~/.local/bin/tmux-copy"

# Useful state without a theme or plugin dependency.
set -g status-interval 5
set -g status-left "#[bold] #S #[default]"
set -g status-right "#(whoami)@#H  %Y-%m-%d %H:%M "
