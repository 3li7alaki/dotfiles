homepage = "https://github.com/pbakaus/impeccable"
desc    = "Frontend design + UX review — anti-slop design language (impeccable.style)"

[skills.pinchtab]
enabled = true
type    = "symlink"          # owned by dotfiles: lives in dotfiles/skills/, linked out
target  = "DOTFILES/skills/pinchtab"   # DOTFILES resolved by setup.sh
homepage = "https://github.com/pinchtab/pinchtab"
desc    = "Browser automation via PinchTab"

[skills.slay]
enabled = true
type    = "symlink"
target  = "DOTFILES/skills/slay"
providers = ["claude", "codex"]
requires_apps = ["slayzone"]
homepage = "https://github.com/debuglebowski/slayzone"
desc    = "Runtime-discovered Slay CLI guidance shared by Claude and Codex"

[skills.mint]
enabled = true
type    = "symlink"
target  = "DOTFILES/skills/mint"
providers = ["claude", "codex"]
homepage = "https://github.com/3li7alaki/mint"
desc    = "Dispatcher so Skill(mint) resolves to CLI guidance instead of erroring"

# ── Hooks (two shapes, both idempotent, both toggled here) ────────────────────
# `script`  → injector: SessionStart + UserPromptSubmit (ponytail pattern, never blocks)
# `command` → event hook: wired on `event` (+ optional `matcher`)

[hooks.rtk]
enabled = true
event   = "PreToolUse"
matcher = "Bash"
command = "rtk hook claude"   # rewrites Bash commands through rtk for token savings
desc    = "rtk Bash rewrite hook — transparent token-optimized command proxy"

[hooks.routing]
enabled = true
script  = "DOTFILES/hooks/routing-activate.sh"   # renders [routing]/[engines] live
desc    = "Injects model routing — dispatch bulk→codex, mechanical→glm, etc."

# Secret scan before a diff can ever leave the box. Two layers, deliberately asymmetric:
#   gitleaks (regex)     → BLOCKS. Near-zero false positives on known key formats, so a
#                          hit is almost always real. Deterministic gate = hard stop.
#   local model (:8080)  → WARNS. Catches the long tail regex structurally cannot see:
#                          a key concatenated across two variables, a base64'd token, a
#                          commented-out credential. (LLMs hit ~84% recall here vs
#                          gitleaks' ~37% — but they also false-positive, so they advise.)
# Endpoint down → skipped silently; gitleaks still ran. A tool that hard-blocks when IT
# breaks is a tool you rip out by Friday. Deterministic blocks, judgment escalates.
[hooks.cbm-gate]
enabled = true
event   = "PreToolUse"
matcher = "Read|Grep|Glob"
command = "DOTFILES/hooks/cbm-code-discovery-gate.sh"
desc    = "Nudges code discovery toward the codebase graph — blocks once per session, then allows"

[hooks.secret-scan]
enabled = true
event   = "PreToolUse"
matcher = "Bash"
command = "DOTFILES/hooks/secret-scan.sh"
desc    = "Pre-commit secret scan — gitleaks blocks, the local model warns on the long tail"

# One-line Claude Code status bar, tuned to this box. Segments (priority high→low, wraps to
# more rows when $COLUMNS is narrow — nothing dropped): ctx-bar% · 5h/7d rate limits ·
# [model·1M] · cwd branch*⑂wt · effort⚡ · ●local-model · 🎙voice · 🖥remote · session. The
# context bar bands on the HANDOFF threshold (~45%), not the 90% compact cliff — this box
# never compacts; voice/remote show only when active.
[statusline]
enabled = true
script  = "DOTFILES/scripts/cc-statusline.sh"
refresh = 10          # re-run every 10s so the clock + local-model badge stay live while idle
padding = 0
desc    = "One-line status bar — model / ctx-handoff / rate-limits / local-model"

[skills.ui-ux-pro-max]
enabled = true
type    = "plugin"           # replaces frontend-design; pairs with impeccable
plugin  = "ui-ux-pro-max@ui-ux-pro-max-skill"
marketplace = "nextlevelbuilder/ui-ux-pro-max-skill"   # setup adds this marketplace first
homepage = "https://github.com/nextlevelbuilder/ui-ux-pro-max-skill"
desc    = "Design intelligence — styles, palettes, font pairings, UX guidelines"

[skills.skillless]
enabled = true
type    = "npx-plugin"       # meta-skill: auto-discovers + installs skills on demand
install = "npx -y skillless"
probe   = "HOME/.claude/plugins/skillless"   # present = installed, skip reinstall
desc    = "Skill finder — discovers/installs relevant skills on demand (/discover, /plans)"

