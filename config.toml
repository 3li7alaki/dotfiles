type    = "plugin"           # Claude plugin + a statusline hook (managed together)
plugin  = "ponytail@ponytail"
marketplace = "DietrichGebert/ponytail"
homepage = "https://github.com/DietrichGebert/ponytail"
desc    = "Lazy-senior-dev discipline — the laziest solution that works"

[skills.caveman]
enabled = true
type    = "plugin"           # pairs with ponytail: ponytail cuts code, caveman cuts prose
plugin  = "caveman@caveman"
marketplace = "JuliusBrussee/caveman"
homepage = "https://github.com/JuliusBrussee/caveman"
desc    = "Terse caveman-speak — ~65% fewer output tokens, code/commands byte-exact"

[skills.codebase-memory]
enabled = true
type    = "mcp"              # MCP server; installer also drops its skills + agent wiring
mcp     = "codebase-memory-mcp"
bin     = "COMMAND:codebase-memory-mcp"   # setup.sh resolves via `command -v` (portable)
