# dotfiles — the control panel.
#
# Flip `enabled` and re-run ./setup.sh. Each entry's `type` tells setup how to
# install/enable or remove it — because these live in five different places
# (PATH binaries, Claude plugins, MCP servers, settings hooks, skill symlinks).
# Default: everything on.

# ── Desktop apps (GUI plus any companion CLI) ────────────────────────────────

[apps.slayzone]
enabled = true
type    = "desktop-app"
install = "bash $DOTFILES/scripts/install-slayzone.sh"
probe_darwin = "/Applications/SlayZone.app"
probe_linux  = "COMMAND:slayzone"
cli      = "slay"
homepage = "https://github.com/debuglebowski/slayzone"
desc     = "Local-first task board, worktree/terminal workspace, and agent-config library"

[apps.t3code]
enabled = true
type    = "desktop-app"
install = "bash $DOTFILES/scripts/install-t3code.sh"
probe_darwin = "/Applications/T3 Code (Alpha).app"
probe_linux  = "COMMAND:t3"
cli      = "t3"
homepage = "https://github.com/pingdotgg/t3code"
desc     = "Primary multi-harness agent chat and diff-review surface"

# ── Agent integrations (generated instructions; no background service) ──────────

[integrations.slayzone-t3-workflow]
enabled = true
requires_apps = ["slayzone", "t3code"]
desc = "SlayZone owns task/worktree/shipping; T3 is the primary chat in that existing workspace"

# ── Tools (PATH binaries; some also register a Claude hook) ───────────────────

[tools.stow]
enabled = true
type    = "binary"
bin     = "COMMAND:stow"
install = "bash $DOTFILES/scripts/install-stow.sh"
homepage = "https://www.gnu.org/software/stow/"
desc    = "Symlink-farm manager used by setup for complete, repo-owned configuration files"

[tools.tmux]
enabled = true
type    = "binary"
bin     = "COMMAND:tmux"
install = "bash $DOTFILES/scripts/install-tmux.sh"
homepage = "https://github.com/tmux/tmux"
desc    = "Persistent terminal multiplexer for durable sessions, panes, and remote work"
agent_guidance = """
Use `tmux` when a requested workflow benefits from a durable terminal session, especially
long-running commands, remote work, or several related interactive processes. Prefer named
sessions and inspect existing sessions before creating another one. Do not attach the user's
interactive client, inject keys into an existing pane, kill sessions, or stop the tmux server
unless the user explicitly requests it. For ordinary short commands, use the normal execution
tool instead of adding an unnecessary tmux layer.
"""

[tools.pass]
enabled = true
type    = "binary"
bin     = "COMMAND:pass"
install = "bash $DOTFILES/scripts/install-pass.sh"
verify_command = "pass --version >/dev/null 2>&1 && command -v pass-env >/dev/null 2>&1 && command -v pass-fzf >/dev/null 2>&1"
auth_check = "test -f \"${PASSWORD_STORE_DIR:-$HOME/.password-store}/.gpg-id\" && gpg --list-secret-keys --with-colons 2>/dev/null | grep -q '^sec:'"
auth_hint = "initialize/import a GPG secret key, then run 'pass init <gpg-id>' interactively"
homepage = "https://www.passwordstore.org/"
desc    = "GPG-encrypted local secret store with a no-plaintext-file environment launcher"
agent_guidance = """
`pass` is human-owned secret storage. Never list, search, show, copy, insert, edit, remove,
or synchronize password-store entries unless the user explicitly requests that exact
operation. Never place decrypted values in prompts, command arguments, output, logs,
repository files, shell history, or temporary files.

For approved local/dev environment injection, use `pass-env --map <private-map> -- <command>`.
The map contains only `ENV_NAME=pass/entry` references and belongs outside repositories,
normally under `~/.config/pass-env/` with mode 0600. `pass-env` decrypts each entry's first
line directly into the child process environment without printing it or writing plaintext.
Do not combine it with `set -x`, `env`, `printenv`, debug dumps, or commands expected to
echo their environment. This reduces accidental disclosure; it cannot hide a secret from
the child process that receives it and is not authorization to access production secrets.

`pass-fzf` is a human-facing entry-name picker and must not be launched without an
interactive TTY and an explicit user request. Prefer `pass-fzf --clip`, which keeps the
decrypted first line out of terminal output, over composing a selection with plain
`pass show`. Never add a decrypted secret preview to the fzf interface.
"""

[tools.github-cli]
enabled = true
type    = "binary"
bin     = "COMMAND:gh"
install = "bash $DOTFILES/scripts/install-github-cli.sh"
auth_check = "gh auth status >/dev/null 2>&1"
auth_hint = "run 'gh auth login' interactively, or provide GH_TOKEN/GITHUB_TOKEN for automation"
homepage = "https://github.com/cli/cli"
desc    = "Official GitHub CLI for pull requests, checks, issues, releases, and API access"
agent_guidance = """
Prefer `gh` over browser scraping for GitHub repository state: pull requests, issues,
workflow runs/checks, releases, and API queries. Prefer non-interactive structured output
such as `--json` with `--jq` or `gh api` when results will be parsed or summarized.

Treat authentication as user-owned. Read-only inspection is appropriate when relevant;
creating or editing issues/PRs, commenting, merging, changing workflow state, publishing
releases, or otherwise mutating GitHub requires authorization from the user's request.
Never print tokens or copy authentication material into repository files.
"""

[tools.jq]
enabled = true
type    = "binary"
install = "bash $DOTFILES/scripts/install-jq.sh"
verify_command = "jq --version 2>/dev/null | grep -Eq '^jq-[0-9]'"
homepage = "https://github.com/jqlang/jq"
desc    = "Lightweight structural JSON querying, validation, filtering, and transformation"
agent_guidance = """
Prefer `jq` for inspecting, validating, filtering, and transforming JSON or JSON Lines.
Do not parse structured JSON with `grep`, `sed`, or fragile string matching. Use `jq -e`
when a filter's truthiness should control a command's exit status, `-r` only when raw text
is intentionally required, and `-c` for compact machine-oriented output. Quote jq programs
with single quotes in Unix shells.

Keep Python or the project's language for complex multi-step logic, cross-format work, or
maintainable application code. jq writes transformed data to stdout and does not edit a
file in place; use a checked temporary output plus atomic replacement for authorized file
edits, never redirect onto the input file. Do not pass secrets through `--arg` command-line
arguments or print sensitive JSON fields.
"""

[tools.fzf]
enabled = true
type    = "binary"
bin     = "COMMAND:fzf"
install = "bash $DOTFILES/scripts/install-fzf.sh"
verify_command = "fzf --version >/dev/null 2>&1 && command -v fzf-shell-init >/dev/null 2>&1"
shell_command = "fzf-shell-init"
shells  = ["bash", "zsh", "fish"]
homepage = "https://github.com/junegunn/fzf"
desc    = "Interactive fuzzy finder with shell history, path selection, and completion bindings"
agent_guidance = """
`fzf` is for interactive human selection, such as fuzzy shell history and choosing paths
from a terminal. Use it when the user explicitly wants an interactive picker or when a
human-driven workflow clearly benefits from one. Do not launch fzf in non-interactive agent
commands or use it where a deterministic result is required; use `rg`, `fd`, `jq`, or native
tool filters directly for automation. Never assume an fzf selection occurred without a TTY.
"""

[tools.fd]
enabled = true
type    = "binary"
bin     = "COMMAND:fd"
install = "bash $DOTFILES/scripts/install-fd.sh"
verify_command = "fd --version 2>/dev/null | grep -Eq '^fd [0-9]'"
homepage = "https://github.com/sharkdp/fd"
desc    = "Fast, user-friendly path search with Git-aware filtering and concise syntax"
agent_guidance = """
Prefer `fd` for interactive repository path searches: filenames, extensions, entry types,
and ordinary recursive discovery. Remember that it matches filenames rather than full
paths by default and skips hidden and ignored entries; use `--full-path`, `--hidden`,
`--no-ignore`, or `--unrestricted` only when the task requires those scopes.

Keep `find` for existing or POSIX-portable scripts, complex predicates, filesystem edge
cases, and environments without `fd`. Never alias `find` to `fd` or mechanically rewrite
arbitrary find commands because their expressions and behavior are not compatible.
"""

[tools.ripgrep]
enabled = true
type    = "binary"
bin     = "COMMAND:rg"
install = "bash $DOTFILES/scripts/install-ripgrep.sh"
homepage = "https://github.com/BurntSushi/ripgrep"
desc    = "Fast recursive code search with Git-aware filtering and useful defaults"
agent_guidance = """
Prefer `rg` for interactive repository text searches and `rg --files` for file discovery.
It is recursive by default and respects `.gitignore`, hidden-file, and binary-file filters.
Use explicit flags when ignored or hidden content is genuinely in scope.

Keep `grep` for existing scripts, POSIX-portable commands, stdin-oriented pipelines where
it is already the clearest fit, or environments without `rg`. Never alias `grep` to `rg`
or mechanically rewrite arbitrary grep commands: their flags and behavior are not fully
compatible.
"""

[tools.zoxide]
enabled = true
type    = "binary"
install = "curl -sSfL https://raw.githubusercontent.com/ajeetdsouza/zoxide/main/install.sh | sh"
shells  = ["bash", "zsh", "fish"]  # setup initializes installed shells; disable removes its rc blocks
shell_init_args = "--cmd cd"       # replace `cd` with zoxide (real dirs still work, plus jump)
homepage = "https://github.com/ajeetdsouza/zoxide"
desc    = "Smarter cd — jump to frequently used directories with z/zi"

[tools.direnv]
enabled = true
type    = "binary"
install = "brew install direnv"
shells  = ["bash", "zsh", "fish"]
shell_init_verb = "hook"           # `direnv hook <shell>`, not `init`
homepage = "https://direnv.net/"
desc    = "Per-directory env autoload from .envrc (needs `direnv allow` per repo)"

[tools.model]
enabled = true
type    = "binary"
os      = "darwin"
bin     = "COMMAND:model"
install = "mkdir -p $HOME/.local/bin && ln -sfn $DOTFILES/scripts/model $HOME/.local/bin/model"
homepage = "https://github.com/ggml-org/llama.cpp"
desc    = "Local model control — daemon on/off + GGUF registry (list/use/pull)"
agent_guidance = """
`model` controls the local llama-server LLM (daemon on 127.0.0.1:8080; GGUF registry in
~/.local/share/models, active model = the `local.gguf` symlink). Subcommands:
- `model status` — active model + daemon state
- `model on` / `model off` — start/stop the daemon (the model also idle-unloads after 10min,
  so `off` is only for a hard stop, e.g. on battery)
- `model list` — downloaded models (* marks active)
- `model use <file.gguf>` — switch active model + restart daemon
- `model pull <hf-repo> <file.gguf>` — download a GGUF into the registry (aria2, resumable)
When the user wants to try, switch, or download a local model, use these commands rather than
hand-editing the symlink or launchctl. The config-managed default model lives in config.toml
[daemons.local-model] (model_repo / model_file); setup auto-provisions it.
"""

[tools.aria2]
enabled = true
type    = "binary"
bin     = "COMMAND:aria2c"
install = "brew install aria2"
homepage = "https://aria2.github.io/"
desc    = "Multi-connection downloader — fast HF model pulls (curl single-stream throttles)"

[tools.rtk]
enabled = true
type    = "binary"            # the Bash rewrite hook is wired via [hooks.rtk]
install = "curl -fsSL https://raw.githubusercontent.com/rtk-ai/rtk/master/install.sh | sh"
homepage = "https://github.com/rtk-ai/rtk"
desc    = "Rust Token Killer — token-optimizing CLI proxy"

[tools.mint]
enabled = true
type    = "binary"           # installed from its own rolling-latest release
install = "curl -fsSL https://raw.githubusercontent.com/3li7alaki/mint/main/install.sh | sh"
homepage = "https://github.com/3li7alaki/mint"
desc    = "Atomic completion ledger with snapshot-bound receipts"

[tools.codex]
enabled = true               # global default; a box w/o GPT access sets false in config.local.toml
type    = "binary"           # already on PATH; presence-checked only
# NB: ~/.codex/config.toml is partly machine-owned (trust levels, projects) — NOT a
# fully-owned config file, so no config_dest here (that would clobber it). setup.sh
# ensures just `model = "gpt-5.6-sol"` via the codex step, leaving the rest intact.
default_model = "gpt-5.6-sol"                        # setup ensures this key; -c model=gpt-5.6-terra for mid tier
homepage = "https://github.com/openai/codex"
desc    = "OpenAI Codex CLI — GPT-5.6 worker"

[tools.opencode]
enabled = true
type    = "binary"           # headless worker chassis for API-only models (GLM + local)
install = "curl -fsSL https://opencode.ai/install | bash"
config  = "DOTFILES/configs/opencode.json"          # GLM + local provider config, HOME rendered by setup
config_dest = "HOME/.config/opencode/opencode.json"
requires_file = "HOME/.glm_api_key"                 # setup warns if missing (GLM dead without it)
homepage = "https://github.com/anomalyco/opencode"
desc    = "OpenCode — headless agent runner; hosts GLM + the local model via opencode.json"

# The local-model runtime. macOS-only; served as a launchd daemon (see [daemons.local-model]).
# Both entries can be installed — `[daemons.local-model].runtime` decides which one actually
# serves :8080, so you can bench them head-to-head on the real jobs and then pin the winner.
# Pinned to llama.cpp. mlx_lm was evaluated on the M5 Pro and dropped 2026-07-17 —
# not on speed, on maintenance. MLX co-creator Awni Hannun left Apple 2026-02; mlx-lm
# has had no release since 2026-04-22 and its open-PR backlog (311) now exceeds its
# open issues (198) — contributors still submit, nobody merges. Apple moved its LLM
# investment to mlx-swift-lm/Foundation Models (WWDC26) and has no product reason to
# maintain an OpenAI-compatible Python HTTP server. The old note here claimed MLX was
# "the only runtime using M5 neural accelerators" — that was false: ggerganov merged
# the Metal4 tensor API (llama.cpp#16634) 2025-11-06, two weeks BEFORE Apple published
# its own MLX M5 post, and without owning M5 hardware.
#
# MLX *core* is healthy and still worth knowing about. If it is ever wanted here again:
#   - inference  -> Ollama's MLX engine or LM Studio's mlx-engine (both maintained;
#                   mlx_lm.server is not). Only reconsider if mlx-lm merges its MTP PR
#                   (#990, open since 2026-03) and the decode gap actually reopens.
#   - fine-tuning -> mlx_lm.lora, the ONLY local LoRA/QLoRA trainer on Metal. llama.cpp
#                   removed training in 2024 and its WIP path is FP32/CPU/CUDA-only.
#                   This is the one thing llama.cpp structurally cannot do.
[tools.llama-server]
enabled = true
type    = "binary"
os      = "darwin"                                  # setup skips + verify ignores on non-darwin
install = "brew install llama.cpp"                  # upstream ONLY: LM Studio's bundled runtime
                                                    # silently fails the tensor-API check and forfeits
                                                    # ~2.4x prefill (lmstudio-bug-tracker#2040).
                                                    # Verify: startup log must NOT say
                                                    # "tensor API is not supported ... disabling".
homepage = "https://github.com/ggml-org/llama.cpp"
desc    = "llama.cpp server — local OpenAI endpoint; wins on ops, MTP, and M5 tensor-API prefill"

# ── Static configuration packages (GNU Stow; setup remains the entry point) ──
# Complete files belong here. Generated, marker-managed, secret, and machine-local files do not.

[stow.tmux]
enabled = true
package = "tmux"
target  = "HOME"
requires_tools = ["stow", "tmux"]
links   = [".tmux.conf", ".local/bin/tmux-copy"]
homepage = "https://github.com/tmux/tmux"
desc    = "Portable tmux defaults and a macOS/Linux clipboard bridge"

[stow.raycast]
enabled = true
package = "raycast"
target  = "HOME"
requires_tools = ["stow"]
links   = [".config/raycast/ai/providers.yaml"]
homepage = "https://raycast.com"
desc    = "Raycast custom AI provider — points Raycast at the local llama-server (:8080)"

