[skills.impeccable]
enabled = true
type    = "npx-plugin"       # pbakaus/impeccable — proper global install, no symlinks
install = "cd $HOME && printf '1\\nglobal\\n' | timeout_cmd 120 npx -y impeccable skills install || true"
