[plugins]
enabled = [
  { name = "commit-commands@claude-plugins-official", desc = "Commit, push, and pull-request workflows" },
  { name = "context7@claude-plugins-official", desc = "Current library documentation lookup" },
  { name = "gopls-lsp@claude-plugins-official", desc = "Go language-server integration" },
  { name = "typescript-lsp@claude-plugins-official", desc = "TypeScript language-server integration" },
  { name = "php-lsp@claude-plugins-official", desc = "PHP language-server integration" },
  { name = "pyright-lsp@claude-plugins-official", desc = "Python language-server integration" },
  { name = "claude-md-management@claude-plugins-official", desc = "CLAUDE.md maintenance workflows" },
]
homepage = "https://github.com/anthropics/claude-plugins-official"

# ── Daemons (launchd background services; macOS-only, toggled like everything) ─
# The local model's OpenAI-compatible endpoint, run as a LaunchAgent. Linux boxes skip
# the whole section (`os = "darwin"`) and every local-routed job escalates to a cloud pool.
#
# RUNTIME = llama-server, pinned. The clinching reason is prompt caching, not raw speed.
# This workload is prefill-heavy with near-zero generation (scan a diff, verify a diff,
# answer yes/no) and re-sends the SAME system prefix every call. llama-server caches that
# prefix by default (`cache_prompt`), so a cache hit SKIPS prefill entirely — which beats
# any runtime that recomputes the prefix each call even if it prefills 2x faster. (mlx_lm
# had no server-mode prompt cache at all and two open bugs firing on exactly this pattern;
# it was dropped 2026-07-17 — see [tools.llama-server] for the full autopsy.) Anything
# serving OpenAI-compatible on :8080 is drop-in downstream — opencode.json, [engines.local],
# and the hooks only ever see 127.0.0.1:8080 — but the pin stays until something beats
# cache-skipped prefill, not just cold prefill.
#
# WHICH model sits behind the port is deliberately not config's business: `model` is a
# SYMLINK. Repoint it at a 4B when you need RAM back, a 35B-A3B when you don't. Nothing
# downstream changes. Manage memory at the daemon, never in the consumers.
# Recommended weights: unsloth/Qwen3.6-35B-A3B-GGUF at UD-Q4_K_XL (~22.4GB). MoE (3B active)
# so it's ~3x the tok/s of a dense 27B, and 22GB leaves real headroom for KV cache — which is
# the actual memory pressure here, not weights. Don't bother with Q6: it buys ~nothing over Q4
# (Unsloth's own numbers: +0.24 MMLU) and eats the headroom long prompts need.
[daemons.local-model]
enabled  = true
os       = "darwin"
runtime  = "llama-server"                            # pinned 2026-07-17; mlx dropped (see [tools.llama-server])
label    = "local-model"                             # launchd label; also the plist basename
plist    = "DOTFILES/configs/local-model.plist"      # template; HOME/MODEL/PORT rendered by setup
model    = "HOME/.local/share/models/local.gguf"     # SYMLINK -> whichever weights are loaded
port     = 8080
# Auto-provision: setup downloads model_file from the HF repo if absent, then points the
# `model` symlink at it. Swap models by editing these two lines + re-running setup.
model_repo = "unsloth/Qwen3.6-35B-A3B-GGUF"
model_file = "Qwen3.6-35B-A3B-UD-Q4_K_XL.gguf"
desc     = "Local model endpoint (llama.cpp) — idle-unloads so it costs no RAM at rest"

# ── Cron (idempotent crontab entries, marker-tagged; toggled like everything) ──
# claude-md-management's auto-capture skill grows CLAUDE.md files during
# sessions; this cron keeps them pruned with /revise-claude-md — no human loop.

[cron.revise-claude-md]
enabled  = true
schedule = "0 3 * * 0"                              # Sundays 03:00
script   = "DOTFILES/scripts/revise-claude-mds.sh"  # logs to ~/.local/state/
desc     = "Weekly CLAUDE.md hygiene across ~/Projects repos"

[cron.update-tools]
enabled  = true
schedule = "0 4 * * 0"                              # Sundays 04:00
script   = "DOTFILES/scripts/update-tools.sh"       # brew upgrade + re-run installers
desc     = "Weekly tool auto-update (latest binaries)"

# ── Model routing (dispatch guidance for the agent; NO worker loop) ───────────
# Static task-shape → model rules + a fallback order. There is NO daemon parsing
# this — the [routing]/[engines] tables are rendered into the agent's attention
# (via hooks/routing-activate.sh + the CLAUDE.md block) and the AGENT dispatches
# accordingly. It's a convention the agent follows, not enforced infra. On a 429,
# the agent walks `fallback` by hand. Keep it honest: guidance, not automation.
#
# Cost model is NOT list price — it's THREE flat-rate subscription pools, all
# LIMIT-bound with ~0 marginal cost. Claude Max 5x (opus/fable/sonnet), ChatGPT
# Pro (the GPT-5.6 family: sol/terra/luna), and the GLM Coding Plan (glm-5.2).
# Nothing here is metered per-token. Tiebreaker isn't price, it's quota pressure:
# spread load so no single pool's cap is the bottleneck — and match each task to
# the pool with the right intelligence/taste, since spending a slot costs nothing.

# These are the GLOBAL defaults (a box with codex+Pro+GLM). Per-box reality —
# a machine with no codex, say — overrides in gitignored config.local.toml
# (active=false on a GPT engine, bulk=glm, etc). Never hardcode one box here.
[routing]
bulk       = "gpt-5.6-terra"   # routine clear-spec impl, migrations — spares Sol's cap
heavy      = "gpt-5.6-sol"     # hard / agentic / multi-file — the flagship coder
mechanical = "glm"             # trivial edits, data munging — GLM coding plan (flat), spreads load off GPT/Claude
ui         = "opus-4.8"        # anything user-facing (taste ≥ 7), Max-flat
review     = "fable-5"         # plan/impl review — taste; add sol as cross-vendor 2nd on high stakes
private    = "local"           # diff//data must NOT leave the box (NDA, secrets, client code) — cloud is not an option at any price
verify     = "local"           # ASYNC closed-question checks: mint's anti-gaming lens, secret scan. Never interactive.
fallback   = ["gpt-5.6-sol", "gpt-5.6-terra", "glm", "opus-4.8"]   # degrade across pools; all flat, so purely cap relief

# Codex dispatch mechanics (verified 2026-07-14, codex 0.144.x). Rendered into attention
# whenever a codex engine is active, so agents dispatch it correctly instead of hand-rolling.
# Prefer the codex plugin for BACKGROUND review/rescue; raw `codex exec` for one-shot; never MCP.
codex_usage = """
Dispatching Codex (codex 0.144.x): pick the surface by shape.
- Background review / rescue (streaming + pollable): use the codex plugin slash commands —
  /codex:review, /codex:adversarial-review, /codex:rescue — with Claude Code run_in_background;
  poll /codex:status, read /codex:result, /codex:cancel to stop. This is the clean path for a
  long or parallel job (the codex:codex-rescue subagent wraps it).
- One-shot headless via Bash: codex exec -s workspace-write --skip-git-repo-check "<prompt>" </dev/null
  ALWAYS append </dev/null — piped stdin hangs ("Reading additional input from stdin...") and is
  injected as a <stdin> block; use `codex exec -` only to deliberately feed the prompt on stdin.
  Add --json -o out.txt for machine-readable events + a clean final message; -s read-only for
  review/diagnosis with no edits; -m <model> or -c model="…" to pin a tier.
- Non-interactive code review: codex exec review --uncommitted </dev/null  (or --base <ref> / --commit <sha>).
- Do NOT wire codex as an MCP server (codex mcp-server) into Claude Code: OpenAI routes automation
  to exec/SDK, and the stdio MCP path has documented stdin-EOF/timeout hangs. Use exec or the plugin.
"""
# NOTE: `local` is deliberately ABSENT from `fallback`. It is not a weaker peer of the
# cloud tiers — it is a different SHAPE of worker. Local can't reliably hold a long
# agentic loop (tool-call schema drifts as context fills), so falling back to it mid-loop
# trades a clean stall for a silent half-finished diff. Local gets jobs, never leftovers.

# How the agent runs each external model — model name → chassis + invocation.
# The agent copies these `run` lines when it dispatches to a worker via Bash.
# codex exec defaults to sol (~/.codex/config.toml model=gpt-5.6-sol); -c model= overrides per tier.
[engines."gpt-5.6-sol"]
run    = "codex exec"                                       # flagship, Pro-flat
active = true

[engines."gpt-5.6-terra"]
run    = "codex exec -c model=gpt-5.6-terra"                # mid tier, Pro-flat
active = true

[engines.glm]
run    = "opencode run --model glm/glm-5.2 --auto"  # GLM-5.2 (coding plan) via OpenCode
active = true                                    # GLM_API_KEY set; live worker, flat coding plan
requires_env = "GLM_API_KEY"                     # loop skips glm if this ever goes missing

# The local model, hosted by llama-server on :8080, is driven through OpenCode exactly like
# GLM — same @ai-sdk/openai-compatible provider, different baseURL. A driver records its
# executor/vendor/model/locality/executionRef as generic mint provenance. mint has no registry
# and does not authenticate that declared identity.
#
# Local is ASYNC-ONLY by design. Inference latency is irreducible and local is SLOWER than
# your cloud pools — that is fine when nothing waits on it (a hook, a queue, a `done` gate)
# and intolerable the moment it sits in front of your cursor. Every local tool that people
# actually kept was async; every one they ripped out was interactive. Don't cross that line.
[engines.local]
run    = "opencode run --model local/local --auto"
active = false                                   # flip true on the Mac (setup does this via config.local.toml)
requires_endpoint = "http://127.0.0.1:8080/v1"   # setup/verify curl this; local lane is dead without it
